<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgBanner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#89b4fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bgBanner)"/>

  <!-- Logo icon (simplified) -->
  <rect x="24" y="28" width="144" height="144" rx="28" fill="#6C63FF"/>
  <!-- Document lines in mini logo -->
  <rect x="44" y="60" width="60" height="5" rx="2.5" fill="#cba6f7" opacity="0.9"/>
  <rect x="44" y="72" width="70" height="4" rx="2" fill="#a6adc8" opacity="0.7"/>
  <rect x="44" y="83" width="55" height="4" rx="2" fill="#a6adc8" opacity="0.5"/>
  <!-- Mini magnifier -->
  <circle cx="130" cy="128" r="20" fill="none" stroke="white" stroke-width="6" opacity="0.95"/>
  <line x1="144" y1="142" x2="156" y2="154" stroke="white" stroke-width="6"
        stroke-linecap="round" opacity="0.95"/>

  <!-- App name -->
  <text x="190" y="108" font-family="Segoe UI, Arial" font-size="58" font-weight="700"
        fill="url(#textGrad)">DashLook</text>

  <!-- Tagline -->
  <text x="192" y="142" font-family="Segoe UI, Arial" font-size="20" fill="#a6adc8">
    Instant file preview for Windows  ·  Press Space to peek
  </text>

  <!-- Version badge -->
  <rect x="192" y="155" width="68" height="22" rx="11" fill="#313244"/>
  <text x="226" y="170" font-family="Segoe UI" font-size="12" fill="#cba6f7"
        text-anchor="middle">v1.0.0</text>

  <!-- Platform badge -->
  <rect x="270" y="155" width="98" height="22" rx="11" fill="#313244"/>
  <text x="319" y="170" font-family="Segoe UI" font-size="12" fill="#89b4fa"
        text-anchor="middle">Windows 10/11</text>
</svg>
