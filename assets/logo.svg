<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="256" height="256" rx="56"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Glass overlay -->
  <rect width="256" height="128" rx="0" fill="url(#glassGrad)" clip-path="url(#roundClip)"/>

  <!-- Preview panel (document) -->
  <rect x="44" y="52" width="120" height="148" rx="10" fill="#1a1a2e" opacity="0.9"/>
  <!-- Document lines -->
  <rect x="58" y="76" width="72" height="7" rx="3.5" fill="#cba6f7" opacity="0.9"/>
  <rect x="58" y="92" width="86" height="5" rx="2.5" fill="#a6adc8" opacity="0.7"/>
  <rect x="58" y="105" width="78" height="5" rx="2.5" fill="#a6adc8" opacity="0.7"/>
  <rect x="58" y="118" width="65" height="5" rx="2.5" fill="#a6adc8" opacity="0.5"/>
  <rect x="58" y="131" width="80" height="5" rx="2.5" fill="#a6adc8" opacity="0.5"/>
  <rect x="58" y="144" width="55" height="5" rx="2.5" fill="#a6adc8" opacity="0.4"/>
  <!-- Image placeholder in document -->
  <rect x="58" y="158" width="86" height="28" rx="4" fill="#313244" opacity="0.8"/>
  <text x="88" y="177" font-size="16" text-anchor="middle" fill="#cba6f7" opacity="0.9">🖼</text>

  <!-- Magnifying glass circle -->
  <circle cx="178" cy="162" r="38" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.95"/>
  <circle cx="178" cy="162" r="26" fill="#1a1a2e" opacity="0.7"/>
  <!-- Inner lens sparkle lines -->
  <line x1="166" y1="150" x2="190" y2="174" stroke="#cba6f7" stroke-width="3" opacity="0.6"/>
  <line x1="166" y1="158" x2="174" y2="166" stroke="#89b4fa" stroke-width="2" opacity="0.5"/>

  <!-- Magnifying glass handle -->
  <line x1="207" y1="191" x2="228" y2="212" stroke="#ffffff" stroke-width="13"
        stroke-linecap="round" opacity="0.95"/>
  <line x1="207" y1="191" x2="228" y2="212" stroke="#6C63FF" stroke-width="6"
        stroke-linecap="round" opacity="0.5"/>
</svg>
