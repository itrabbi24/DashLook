name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:          # allows manual trigger from GitHub Actions tab
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  # ── Windows build ────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version
        id: ver
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ github.event.inputs.tag }}"
          } else {
            "${{ github.ref_name }}"
          }
          $v = $tag.TrimStart('v')
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "tag=$tag"   >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/DashLook/DashLook.csproj

      - name: Publish — single EXE + installer source
        shell: pwsh
        run: |
          dotnet publish src/DashLook/DashLook.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output dist/win-setup `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.ver.outputs.version }}

          # Copy for standalone EXE release before the installer uses it
          Copy-Item dist/win-setup/DashLook.exe `
            "dist/DashLook-${{ steps.ver.outputs.version }}-win-x64.exe"

      - name: Publish — portable ZIP
        shell: pwsh
        run: |
          dotnet publish src/DashLook/DashLook.csproj `
            --configuration Release `
            --runtime win-x64 `
            --output dist/win-portable `
            -p:Version=${{ steps.ver.outputs.version }}

          Compress-Archive `
            -Path dist/win-portable/* `
            -DestinationPath "dist/DashLook-${{ steps.ver.outputs.version }}-windows-x64-portable.zip"

      - name: Build MSI installer
        shell: pwsh
        run: |
          dotnet build installer/DashLook.Installer.wixproj `
            --configuration Release `
            -p:SolutionDir="${{ github.workspace }}\" `
            -p:Version=${{ steps.ver.outputs.version }}

          # Find and copy the MSI to dist/
          $msi = Get-ChildItem "installer/bin/Release/en-US/" -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName "dist/DashLook-${{ steps.ver.outputs.version }}-Setup.msi"
            Write-Host "MSI built: $($msi.Name)"
          } else {
            Write-Error "MSI not found in installer/bin/Release/en-US/"
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/DashLook-${{ steps.ver.outputs.version }}-win-x64.exe
            dist/DashLook-${{ steps.ver.outputs.version }}-windows-x64-portable.zip
            dist/DashLook-${{ steps.ver.outputs.version }}-Setup.msi

  # ── Linux build ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/DashLook.Linux/DashLook.Linux.csproj

      - name: Publish — linux-x64
        run: |
          dotnet publish src/DashLook.Linux/DashLook.Linux.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output dist/linux-x64 \
            -p:PublishSingleFile=true \
            -p:Version=${{ steps.ver.outputs.version }}

          tar -czf "dist/DashLook-${{ steps.ver.outputs.version }}-linux-x64.tar.gz" \
            -C dist/linux-x64 .

      - name: Publish — linux-arm64
        run: |
          dotnet publish src/DashLook.Linux/DashLook.Linux.csproj \
            --configuration Release \
            --runtime linux-arm64 \
            --self-contained true \
            --output dist/linux-arm64 \
            -p:PublishSingleFile=true \
            -p:Version=${{ steps.ver.outputs.version }}

          tar -czf "dist/DashLook-${{ steps.ver.outputs.version }}-linux-arm64.tar.gz" \
            -C dist/linux-arm64 .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/DashLook-*.tar.gz

  # ── Publish release ──────────────────────────────────────────────────────────
  publish-release:
    name: Publish Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "tag=$TAG"         >> $GITHUB_OUTPUT

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release/

      - name: List release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "DashLook ${{ steps.ver.outputs.tag }}"
          make_latest: true
          prerelease: ${{ contains(steps.ver.outputs.tag, 'beta') || contains(steps.ver.outputs.tag, 'rc') }}
          body: |
            ## DashLook ${{ steps.ver.outputs.tag }}

            > Instant file preview for Windows and Linux — press `Space` to preview any file

            ### Download

            | Platform | File | Description |
            |---|---|---|
            | 🪟 Windows | `DashLook-*-Setup.msi` | Installer — recommended, adds to Start Menu & auto-start |
            | 🪟 Windows | `DashLook-*-win-x64.exe` | Single EXE — just run it, no install needed |
            | 🪟 Windows | `DashLook-*-windows-x64-portable.zip` | Portable ZIP — carry on USB, no install |
            | 🐧 Linux | `DashLook-*-linux-x64.tar.gz` | x64 (Ubuntu, Debian, Fedora…) |
            | 🐧 Linux | `DashLook-*-linux-arm64.tar.gz` | ARM64 (Raspberry Pi, etc.) |

            ### Windows quick start
            - **Installer (recommended):** run `DashLook-*-Setup.msi`, follow the wizard — DashLook starts automatically
            - **Portable:** extract the ZIP or run the EXE directly — no install required
            - Select any file in Explorer → press **`Space`** → instant preview

            ### Linux quick start
            ```bash
            tar -xzf DashLook-*-linux-x64.tar.gz
            chmod +x DashLook
            ./DashLook /path/to/file.png
            ```

            ---
            Built by [ARG RABBI](https://itrabbi24.github.io/)
          files: release/*
