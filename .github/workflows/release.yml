name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version
        id: ver
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ github.event.inputs.tag }}"
          } else {
            "${{ github.ref_name }}"
          }
          $v = $tag.TrimStart('v')
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/DashLook/DashLook.csproj

      - name: Publish single EXE + installer source
        shell: pwsh
        run: |
          dotnet publish src/DashLook/DashLook.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output dist/win-setup `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.ver.outputs.version }}

          Copy-Item dist/win-setup/DashLook.exe `
            "dist/DashLook-${{ steps.ver.outputs.version }}-win-x64.exe"

      - name: Publish portable ZIP
        shell: pwsh
        run: |
          dotnet publish src/DashLook/DashLook.csproj `
            --configuration Release `
            --runtime win-x64 `
            --output dist/win-portable `
            -p:Version=${{ steps.ver.outputs.version }}

          Compress-Archive `
            -Path dist/win-portable/* `
            -DestinationPath "dist/DashLook-${{ steps.ver.outputs.version }}-windows-x64-portable.zip"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Setup installer
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe",
            (Get-Command ISCC -ErrorAction SilentlyContinue)?.Source
          ) | Where-Object { $_ -and (Test-Path $_) }

          if (-not $candidates) {
            Write-Host "Available Inno Setup dirs:"
            Get-ChildItem "C:\Program Files (x86)", "C:\Program Files" -Directory -ErrorAction SilentlyContinue |
              Where-Object Name -like "*Inno*" | ForEach-Object { Write-Host "  $($_.FullName)" }
            exit 1
          }

          $iscc = $candidates[0]
          Write-Host "ISCC: $iscc"
          & $iscc installer/DashLook.iss /DAppVersion=${{ steps.ver.outputs.version }} "/DPublishDir=..\dist\win-setup"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Copy-Item "installer/bin/Release/DashLook-${{ steps.ver.outputs.version }}-Setup.exe" "dist/DashLook-${{ steps.ver.outputs.version }}-Setup.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/DashLook-${{ steps.ver.outputs.version }}-win-x64.exe
            dist/DashLook-${{ steps.ver.outputs.version }}-windows-x64-portable.zip
            dist/DashLook-${{ steps.ver.outputs.version }}-Setup.exe

  publish-release:
    name: Publish Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release/

      - name: List release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "DashLook ${{ steps.ver.outputs.tag }}"
          make_latest: true
          prerelease: ${{ contains(steps.ver.outputs.tag, 'beta') || contains(steps.ver.outputs.tag, 'rc') }}
          body: |
            ## DashLook ${{ steps.ver.outputs.tag }}

            Windows-first instant file preview. Select a file in Explorer or on the desktop, then press `Space`.

            ### Downloads
            - `DashLook-*-Setup.exe`: installer with Start Menu entry and startup integration
            - `DashLook-*-win-x64.exe`: single-file portable executable
            - `DashLook-*-windows-x64-portable.zip`: portable folder build

            ### What's improved
            - stronger Explorer/Desktop selection detection for `Space`
            - Windows-only release pipeline
            - refreshed project branding assets

            Built by [ARG RABBI](https://itrabbi24.github.io/)
          files: release/*
