name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build DashLook
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore NuGet packages
        run: dotnet restore DashLook.sln

      - name: Build (Release)
        run: dotnet build DashLook.sln --configuration Release --no-restore

      - name: Publish main app
        run: |
          dotnet publish src/DashLook/DashLook.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output publish/DashLook `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DashLook-${{ github.sha }}
          path: publish/
          retention-days: 7
