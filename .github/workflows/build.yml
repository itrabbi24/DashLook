name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Windows (WPF)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore src/DashLook/DashLook.csproj

      - name: Build
        run: dotnet build src/DashLook/DashLook.csproj --configuration Release --no-restore

      - name: Publish (portable)
        shell: pwsh
        run: |
          dotnet publish src/DashLook/DashLook.csproj `
            --configuration Release `
            --runtime win-x64 `
            --output publish/DashLook-windows

      - uses: actions/upload-artifact@v4
        with:
          name: DashLook-Windows-${{ github.sha }}
          path: publish/DashLook-windows/
          retention-days: 7
